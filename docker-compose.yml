services:
  aistudio-api:
    build: .
    container_name: aistudio-api
    restart: unless-stopped
    ports:
      - "8080:8080"    # API server
      - "6080:6080"    # noVNC (login flow)
      # - "9222:9222"  # Optional: expose only when debugging Camoufox
    volumes:
      - ./data:/app/data           # Account data persistence
      - ./.env:/app/.env:ro        # Environment config (read-only)
    environment:
      - AISTUDIO_PORT=8080
      - AISTUDIO_CAMOUFOX_PORT=9222
      - AISTUDIO_CAMOUFOX_HEADLESS=1
      - AISTUDIO_ACCOUNTS_DIR=/app/data/accounts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/models"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
